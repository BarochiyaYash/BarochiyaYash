name: Latest Blog Post Workflow

on:
  schedule:
    - cron: "30 0 1,8,15,22 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://yashbarochiya.com/feed/"
          max_post_count: 6
          disable_sort: false
          sort_order: desc
          title_max_length: 60
          description_max_length: 120
          custom_tags: "thumbnail/thumbnail/"
          item_exec: >
            const getMediaUrl = (value) => {
              if (!value) return '';
              if (Array.isArray(value)) return getMediaUrl(value[0]);
              if (typeof value === 'object') return value?.['$']?.url || value?.url || '';
              return String(value);
            };
            const rawContent = item['content:encoded'] || item.content || '';
            const imageFromContent = (rawContent.match(/<img[^>]+src\s*=\s*["']?([^"'\s>]+)["']?/i) || [])[1] || '';
            const mediaThumbnail = getMediaUrl(item['media:thumbnail']);
            const mediaContent = getMediaUrl(item['media:content']);
            const enclosureImage = item.enclosure?.url || '';
            const fallback = `https://raw.githubusercontent.com/${process.env.GITHUB_REPOSITORY}/main/02.png`;
            post.thumbnail = mediaThumbnail || mediaContent || enclosureImage || imageFromContent || fallback;
            const raw = (post.description || '').replace(/<[^>]*>/g, '').replace(/&[a-z#0-9]+;/gi, ' ').replace(/\s+/g, ' ').trim();
            post.description = raw.length > 120 ? raw.slice(0, 120) + '…' : raw;
          template: "<a href=\"$url\" target=\"_blank\"><img src=\"$thumbnail\" alt=\"$title\" title=\"$title\" width=\"400\" /></a>&nbsp;<a href=\"$url\" target=\"_blank\"><b>$title</b><br/><sub>$description</sub></a>$newline$newline"
          output_dir: "."
          filename: "README.md"
          commit_message: "chore: update README with latest blog posts"
          committer_username: "github-actions[bot]"
          committer_email: "41898282+github-actions[bot]@users.noreply.github.com"
